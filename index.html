<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>PORTAL TES - Persona Research</title>
    <style>
        body{font-family:sans-serif;background:#e2e8f0;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
        .box{background:#fff;padding:30px;border-radius:12px;box-shadow:0 10px 20px rgba(0,0,0,0.1);text-align:center;width:90%;max-width:400px;border-top:6px solid #0b2340}
        input{width:100%;padding:12px;margin:10px 0;border:2px solid #ddd;border-radius:8px;box-sizing:border-box;text-align:center;font-size:16px}
        .btn{display:block;background:#0b2340;color:#fff;padding:12px;margin:10px 0;border-radius:8px;text-decoration:none;font-weight:bold;cursor:pointer}
        .btn-menu{background:#f1f5f9;color:#0b2340;border:1px solid #cbd5e1;margin-bottom:8px}
        .btn-menu:hover{background:#d4a017;color:#fff}
    </style>
</head>
<body>
    <div class="box" id="auth">
        <h2>PORTAL AKSES</h2>
        <p style="font-size:13px;color:#666">Masukkan Password Akses</p>
        <input type="password" id="pw" placeholder="Password">
        <button class="btn" style="width:100%;border:none" onclick="go()">MASUK SISTEM</button>
    </div>

    <div class="box" id="menu" style="display:none">
        <h2>MENU UTAMA</h2>
        <a href="simbol_4.html" class="btn btn-menu">1. Tes Kecermatan Simbol</a>
        <a href="mono_7.html" class="btn btn-menu">2. Tes Kecermatan Ikon Emoji</a>
        <a href="mono_2.html" class="btn btn-menu">3. Tes Kecermatan Gambar Khusus</a>
    </div>

    <script>
        function go(){
            const pass = document.getElementById('pw').value;
            if(pass === 'persona05'){
                document.getElementById('auth').style.display = 'none';
                document.getElementById('menu').style.display = 'block';
            } else {
                alert('Password Salah!');
            }
        }
    </script>
</body>
</html>
